version: '3.8'

services:
  # Machine Translation pipeline (Preparation + Inference + Evaluation)
  mt-run:
    build:
      context: .
      dockerfile: Dockerfile
    image: format-beats-descriptions:latest
    container_name: format-beats-mt-run
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app/mt
    command: >
      bash -c "cd data && sh prepare.sh &&
               cd ../src && sh prepare.sh &&
               sh run.sh"

  # Question Answering pipeline (Inference + Evaluation)
  qa-run:
    build:
      context: .
      dockerfile: Dockerfile
    image: format-beats-descriptions:latest
    container_name: format-beats-qa-run
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=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
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app/qa/src
    command: >
      bash -c "bash run.sh"

volumes:
  hf_cache:
